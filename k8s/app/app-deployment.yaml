# Despliegue del microservicio Spring Boot.
#
# image: "springboot-app-devops:latest" se construye LOCAL con
#   docker build -t springboot-app-devops:latest .
# Como Docker Desktop Kubernetes comparte el mismo daemon de Docker que usas
# para "docker build", no hace falta subir la imagen a ningun registry para
# que el cluster la encuentre: por eso imagePullPolicy es "IfNotPresent".
# El pipeline (job "deploy" en el runner self-hosted) hace ese build y luego
# actualiza el tag con "kubectl set image" en cada despliegue automatico.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  namespace: devops-usuarios
  labels:
    app: springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: springboot-app
          image: springboot-app-devops:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
