version: '3.8'

# Uso local/manual (no es parte del pipeline): levanta la app + MySQL para
# probar todo en tu maquina sin necesidad de Kubernetes.
#   docker compose up -d --build
#   curl http://localhost:8080/usuarios
#   docker compose down -v   (para limpiar)

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root-2023
      MYSQL_DATABASE: usuariosdb

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot-2023"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: springboot-app
    restart: always

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/usuariosdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root-2023

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql-data:
