name: CI/CD Pipeline

# - push/pull_request a main: corren build-test-sonar (sirve como "required
#   status check" para Branch Protection, Paso 13 de la guia).
# - solo el push directo a main (nunca un PR externo) dispara el build de
#   Docker y el despliegue real, por seguridad: un self-hosted runner nunca
#   debe ejecutar codigo de un pull_request no confiable.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------
  # Job 1: compila, corre pruebas reales (JaCoCo) y analiza con SonarCloud.
  # Si una prueba falla o el Quality Gate de SonarCloud no pasa, este job
  # falla y los jobs siguientes (que dependen de el con "needs") NO corren.
  # Esto es la evidencia del Paso 14 ("detener el pipeline ante errores").
  # ---------------------------------------------------------------------
  build-test-sonar:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.v