version: '3.8'

# Uso local/manual (no es parte del pipeline): levanta la app + MySQL para
# probar todo en tu maquina sin necesidad de Kubernetes.
#   docker compose up -d --build
#   curl http://localhost:8080/usuarios
#   docker compose down -v   (para limpiar)

services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always

    environment:
      MYSQ