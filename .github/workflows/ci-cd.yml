name: CI/CD Pipeline

# - push/pull_request a main: corren build-test-sonar (sirve como "required
#   status check" para Branch Protection, Paso 13 de la guia).
# - solo el push directo a main (nunca un PR externo) dispara el build de
#   Docker y el despliegue real, por seguridad: un self-hosted runner nunca
#   debe ejecutar codigo de un pull_request no confiable.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------
  # Job 1: compila, corre pruebas reales (JaCoCo) y analiza con SonarCloud.
  # Si una prueba falla o el Quality Gate de SonarCloud no pasa, este job
  # falla y los jobs siguientes (que dependen de el con "needs") NO corren.
  # Esto es la evidencia del Paso 14 ("detener el pipeline ante errores").
  # ---------------------------------------------------------------------
  build-test-sonar:
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.value }}
      start_time: ${{ steps.timer.outputs.start }}

    # MySQL real para que el test de contexto (SpringbootAppDevopsApplicationTests)
    # pueda conectarse en localhost:3306, igual que application.properties espera
    # cuando no hay variables de entorno (caso de este runner de GitHub).
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root-2023
          MYSQL_DATABASE: usuariosdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot-2023"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Marcar inicio del pipeline
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud analiza mejor el historial completo

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Dar permisos a Maven Wrapper
        run: chmod +x mvnw

      - name: Compilar y ejecutar pruebas (con JaCoCo)
        run: ./mvnw -B clean verify

      - name: Analisis de calidad SonarCloud (con Quality Gate bloqueante)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey=DiegoRobleM_Ing-DevOps \
            -Dsonar.organization=diegoroblem \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${SONAR_TOKEN} \
            -Dsonar.qualitygate.wait=true

      - name: Calcular % de cobertura (JaCoCo) para el dashboard
        id: coverage
        run: |
          VALUE=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('target/site/jacoco/jacoco.xml').getroot()
          counters = [c for c in root if c.tag == 'counter' and c.get('type') == 'INSTRUCTION']
          c = counters[-1]
          missed = int(c.get('missed')); covered = int(c.get('covered'))
          print(f'{covered / (missed + covered) * 100:.1f}')
          ")
          echo "Cobertura calculada: $VALUE%"
          echo "value=$VALUE" >> "$GITHUB_OUTPUT"

      - name: Subir jar compilado como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5

  # ---------------------------------------------------------------------
  # Job 2: construye la imagen Docker y la publica en GitHub Container
  # Registry (GHCR), como respaldo versionado de cada build (Paso 3).
  # Solo corre con push directo a main, nunca en pull_request.
  # ---------------------------------------------------------------------
  docker-build-push:
    needs: build-test-sonar
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR exige nombres en minusculas; github.repository_owner puede venir
      # con mayusculas (ej. "DiegoRobleM"), asi que lo normalizamos aqui.
      - name: Normalizar nombre del owner a minusculas
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build y push de la imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/proyecto_springboot_usuarios:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/proyecto_springboot_usuarios:${{ github.sha }}

  # ---------------------------------------------------------------------
  # Job 3: despliega en el Kubernetes (k3s) de la instancia EC2 de AWS
  # Academy. Corre en un runner self-hosted instalado DENTRO de esa misma
  # instancia (ver docs/), asi que "kubectl" ya apunta al cluster correcto
  # sin configuracion adicional. La imagen ya fue construida y publicada en
  # GHCR por el job anterior, asi que aqui no se vuelve a construir nada:
  # solo se actualiza el tag desplegado.
  # Tambien empuja metricas de este pipeline (duracion, cobertura) al
  # Pushgateway para que se vean en el dashboard de Grafana
  # (Paso 8, Paso 9, Paso 10, Paso 11).
  # ---------------------------------------------------------------------
  deploy:
    needs: [ build-test-sonar, docker-build-push ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [ self-hosted, aws-ec2 ]

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Aplicar manifiestos de Kubernetes
        run: kubectl apply -f k8s/ --recursive

      - name: Actualizar la imagen del deployment (tag = commit de GHCR)
        run: kubectl set image deployment/springboot-app springboot-app=ghcr.io/diegoroblem/proyecto_springboot_usuarios:${{ github.sha }} -n devops-usuarios

      - name: Esperar a que el rollout termine correctamente
        run: kubectl rollout status deployment/springboot-app -n devops-usuarios --timeout=180s

      # Runner Linux real (no Windows/Docker Desktop), asi que el NodePort
      # del Pushgateway responde directo en localhost sin workarounds.
      - name: Publicar metricas del pipeline en Pushgateway
        run: |
          START_TIME=${{ needs.build-test-sonar.outputs.start_time }}
          DURATION=$(( $(date +%s) - START_TIME ))
          COVERAGE="${{ needs.build-test-sonar.outputs.coverage }}"
          echo "Duracion total del pipeline: ${DURATION}s | Cobertura: ${COVERAGE}%"

          printf "pipeline_duration_seconds %s\npipeline_test_coverage_percent %s\n" "$DURATION" "$COVERAGE" \
            | curl --data-binary @- http://localhost:30091/metrics/job/devops_pipeline
