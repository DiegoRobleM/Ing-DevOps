# Le dice a Grafana: "carga como dashboards todos los JSON que encuentres
# en /var/lib/grafana/dashboards" (ahi se monta el ConfigMap del dashboard).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: devops-usuarios
data:
  provider.yml: |
    apiVersion: 1
    providers:
      - name: 'devops-dashboards'
        orgId: 1
        folder: 'DevOps'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
