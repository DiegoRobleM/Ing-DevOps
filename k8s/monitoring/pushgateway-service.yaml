# NodePort 30091: el runner self-hosted (tu maquina) le hace POST a
# http://localhost:30091/metrics/job/... desde fuera del cluster.
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service
  namespace: devops-usuarios
spec:
  type: NodePort
  selector:
    app: pushgateway
  ports:
    - port: 9091
      targetPort: 9091
      nodePort: 30091
