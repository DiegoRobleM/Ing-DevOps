spring.application.name=springboot-app-devops

# Datos de conexion: usan variables de entorno si existen (Docker/Kubernetes),
# y caen al valor de la derecha (":valor") si no se definen. Asi el mismo jar
# sirve para ejecutar local, en docker-compose o en Kubernetes sin tocar codigo.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/usuariosdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root-2023}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

# ---------------------------------------------------------------------------
# Actuator / Prometheus (Paso 9 y 10 de la guia)
# ---------------------------------------------------------------------------
# Expone solo los endpoints necesarios: health (probes de Kubernetes),
# info y prometheus (scraping de metricas). Nunca exponer "*" en produccion.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

# ---------------------------------------------------------------------------
# Logging (Paso 12 de la guia: logs visibles via "kubectl logs")
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.devops.springboot_app_devops=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
