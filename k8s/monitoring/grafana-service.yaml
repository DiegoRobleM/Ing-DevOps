# http://localhost:30030 -> usuario/clave admin/admin (cambialos si vas
# a dejar esto corriendo mas tiempo que la evaluacion).
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: devops-usuarios
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
