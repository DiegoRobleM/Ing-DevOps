# Contiene el JSON del dashboard (k8s/monitoring/dashboards/devops-dashboard.json)
# como dato de ConfigMap, para que Grafana lo monte y lo cargue solo al
# arrancar (ver grafana-dashboard-provider-configmap.yaml).
#
# Si editas el dashboard desde la UI de Grafana y quieres versionar el
# cambio, exporta el JSON de nuevo y reemplaza el bloque de abajo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-devops
  namespace: devops-usuarios
data:
  devops-dashboard.json: |
    {
      "title": "DevOps - proyecto_springboot_usuarios",
      "uid": "devops-usuarios-dashboard",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "tags": ["devops", "springboot", "evaluacion"],
      "panels": [
        {
          "id": 1,
          "title": "CPU del microservicio",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "process_cpu_usage{job=\"springboot-app\"} * 100",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percent" }, "overrides": [] }
        },
        {
          "id": 2,
          "title": "Memoria JVM (heap usado)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{job=\"springboot-app\", area=\"heap\"})",
              "legendFormat": "heap usado",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] }
        },
        {
          "id": 3,
          "title": "Disponibilidad (1 = arriba)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 8 },
          "targets": [
            { "expr": "up{job=\"springboot-app\"}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "title": "Errores HTTP 5xx (tasa/seg)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 6, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"springboot-app\", status=~\"5..\"}[5m]))",
              "legendFormat": "errores 5xx",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] }
        },
        {
          "id": 5,
          "title": "Duracion del ultimo pipeline",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 8 },
          "targets": [
            { "expr": "pipeline_duration_seconds{job=\"devops_pipeline\"}", "refId": "A" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] }
        },
        {
          "id": 6,
          "title": "Cobertura de pruebas (JaCoCo)",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 14 },
          "targets": [
            { "expr": "pipeline_test_coverage_percent{job=\"devops_pipeline\"}", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "green", "value": 80 }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
