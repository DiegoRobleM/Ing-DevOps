# Provisioning automatico: Grafana arranca con Prometheus ya agregado como
# fuente de datos, sin tener que configurarlo a mano desde la UI.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: devops-usuarios
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: true
